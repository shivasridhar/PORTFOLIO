const { useState, useEffect, useRef } = React;

// Simple motion component that replaces framer-motion
const MotionDiv = ({ animate, initial, transition, style, children, ...props }) => {
  const el = useRef(null);
  const [mounted, setMounted] = useState(false);
  useEffect(() => { setMounted(true); }, []);
  useEffect(() => {
    if (el.current && animate && mounted) {
      const finalStyle = {};
      Object.entries(animate).forEach(([key, value]) => {
        finalStyle[key] = typeof value === 'number' ? value : value;
      });
      Object.assign(el.current.style, finalStyle);
    }
  }, [animate, mounted]);
  const transitionStyle = transition ? `all ${transition.duration || 0.3}s ${transition.ease || 'ease'}` : 'none';
  return React.createElement('div', { ...props, ref: el, style: { ...style, transition: transitionStyle, ...(!mounted && initial) } }, children);
};

// Create motion object with tag functions
const motion = new Proxy({}, {
  get: (target, tag) => {
    return React.forwardRef(({ animate, initial, transition, style, children, ...props }, ref) => {
      const el = useRef(null);
      const [mounted, setMounted] = useState(false);
      useEffect(() => { setMounted(true); }, []);
      useEffect(() => {
        const currentEl = ref?.current || el.current;
        if (currentEl && animate && mounted) {
          Object.entries(animate).forEach(([key, value]) => {
            currentEl.style[key] = typeof value === 'number' ? value : value;
          });
        }
      }, [animate, mounted, ref]);
      const transitionStyle = transition ? `all ${transition.duration || 0.3}s ${transition.ease || 'ease'}` : 'none';
      const finalStyle = { ...style, transition: transitionStyle };
      if (!mounted && initial) {
        Object.assign(finalStyle, initial);
      }
      return React.createElement(tag, { ...props, ref: ref || el, style: finalStyle }, children);
    });
  }
});

// Simple replacements for framer-motion functions
const AnimatePresence = ({ children }) => children;

const useScroll = () => {
  const [scrollY, setScrollY] = useState(0);
  useEffect(() => {
    const handleScroll = () => setScrollY(window.scrollY);
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);
  return { scrollY };
};

const useTransform = (value, inputRange, outputRange) => {
  const [result, setResult] = useState(outputRange[0]);
  useEffect(() => {
    if (typeof value === 'number') {
      const ratio = (value - inputRange[0]) / (inputRange[1] - inputRange[0]);
      const clamped = Math.max(0, Math.min(1, ratio));
      setResult(outputRange[0] + (outputRange[1] - outputRange[0]) * clamped);
    }
  }, [value]);
  return result;
};

/* ============================================================
   CURSOR
============================================================ */
function useCustomCursor(){
  useEffect(() => {
    const cursor = document.getElementById("cursor");
    const dot = document.getElementById("cursor-dot");
    let mx = 0, my = 0, cx = 0, cy = 0;
    const onMove = (e) => { mx = e.clientX; my = e.clientY; if(dot){dot.style.left = mx+"px"; dot.style.top = my+"px";} };
    window.addEventListener("mousemove", onMove);
    let raf;
    const tick = () => {
      cx += (mx - cx) * 0.18;
      cy += (my - cy) * 0.18;
      if(cursor){ cursor.style.left = cx+"px"; cursor.style.top = cy+"px"; }
      raf = requestAnimationFrame(tick);
    };
    tick();

    const addGrow = () => cursor && cursor.classList.add("grow");
    const removeGrow = () => cursor && cursor.classList.remove("grow");

    const observer = new MutationObserver(() => {
      document.querySelectorAll("[data-cursor='grow']").forEach(el => {
        if(!el.dataset.cursorBound){
          el.dataset.cursorBound = "1";
          el.addEventListener("mouseenter", addGrow);
          el.addEventListener("mouseleave", removeGrow);
        }
      });
    });
    observer.observe(document.body, { childList:true, subtree:true });
    document.querySelectorAll("[data-cursor='grow']").forEach(el => {
      el.dataset.cursorBound = "1";
      el.addEventListener("mouseenter", addGrow);
      el.addEventListener("mouseleave", removeGrow);
    });

    return () => {
      window.removeEventListener("mousemove", onMove);
      cancelAnimationFrame(raf);
      observer.disconnect();
    };
  }, []);
}

/* ============================================================
   LENIS + GSAP
============================================================ */
function useSmoothScroll(){
  useEffect(() => {
    const lenis = new Lenis({ duration: 1.15, easing: (t)=> Math.min(1, 1.001 - Math.pow(2, -10*t)), smoothWheel:true });
    lenis.on("scroll", ScrollTrigger.update);
    gsap.ticker.add((time)=> lenis.raf(time*1000));
    gsap.ticker.lagSmoothing(0);
    return () => lenis.destroy();
  }, []);
}

/* ============================================================
   REVEAL ON SCROLL (GSAP)
============================================================ */
function useReveal(ref, opts = {}){
  useEffect(() => {
    if(!ref.current) return;
    const els = ref.current.querySelectorAll("[data-reveal]");
    els.forEach((el, i) => {
      gsap.fromTo(el, { y: 48, opacity: 0 }, {
        y: 0, opacity: 1, duration: 0.9, ease: "power3.out",
        delay: i * 0.06,
        scrollTrigger: { trigger: el, start: "top 88%", toggleActions: "play none none reverse" }
      });
    });
  }, []);
}

/* ============================================================
   PROJECTS — immersive showcase, alternating layouts
============================================================ */
function ProjectCard({ project, index }){
  const ref = useRef(null);
  const [tilt, setTilt] = useState({ x:0, y:0 });
  const reverse = index % 2 === 1;

  const onMouseMove = (e) => {
    const r = ref.current.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    setTilt({ x: py * -6, y: px * 6 });
  };
  const onMouseLeave = () => setTilt({ x:0, y:0 });

  return (
    <div data-reveal className={"grid md:grid-cols-12 gap-8 md:gap-10 items-center py-16 md:py-24 border-b border-[#F5F2EA]/10 last:border-none " + (reverse ? "md:[direction:rtl]" : "")}>
      <div className={"md:col-span-7 " + (reverse ? "[direction:ltr]" : "")}>
        <div
          ref={ref}
          onMouseMove={onMouseMove}
          onMouseLeave={onMouseLeave}
          data-cursor="grow"
          style={{ transform: `rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)` }}
          className="card-3d relative aspect-[16/10] rounded-2xl bg-gradient-to-br from-[#1B1D22] to-[#0B0B0E] border border-[#F5F2EA]/10 overflow-hidden flex items-center justify-center"
        >
          <div className="absolute inset-0 blueprint-grid opacity-40"></div>
          <span className="font-display text-[clamp(4rem,12vw,9rem)] text-[#F5F2EA]/5 select-none">{project.id}</span>
          <div className="absolute top-4 left-4 font-mono text-[10px] uppercase tracking-[0.25em] text-[#FF4D2E] border border-[#FF4D2E]/40 px-2 py-1 rounded-full">{project.tag}</div>
          <div className="absolute bottom-4 right-4 font-mono text-[10px] uppercase tracking-[0.25em] text-[#9CA8B5]">{project.status}</div>
        </div>
      </div>

      <div className={"md:col-span-5 " + (reverse ? "[direction:ltr]" : "")}>
        <div className="font-mono text-[10px] uppercase tracking-[0.3em] text-[#FF4D2E] mb-2">{project.year} — {project.type}</div>
        <h3 className="font-display text-[clamp(2rem,5vw,3.5rem)] leading-tight mb-4">{project.title}</h3>
        <p className="font-mono text-sm leading-relaxed text-[#9CA8B5] mb-6">{project.description}</p>

        <div className="flex flex-wrap gap-2 mb-6">
          {project.stack.map(s => (
            <span key={s} className="font-mono text-[10px] uppercase tracking-widest border border-[#F5F2EA]/15 px-2.5 py-1 rounded-full text-[#F5F2EA]/80">{s}</span>
          ))}
        </div>

        <div className="flex items-center justify-between border-t border-[#F5F2EA]/10 pt-4">
          <div>
            <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-[#9CA8B5]">{project.metric.label}</div>
            <div className="font-display text-2xl text-[#FF4D2E]">{project.metric.value}</div>
          </div>
          <button data-cursor="grow" className="font-mono text-xs uppercase tracking-[0.25em] border border-[#F5F2EA]/20 rounded-full px-5 py-2.5 hover:bg-[#F5F2EA] hover:text-[#0B0B0E] transition-colors duration-300 bg-transparent text-[#F5F2EA] cursor-none">
            View Project
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [loaded, setLoaded] = useState(false);
  useCustomCursor();
  useSmoothScroll();

  useEffect(() => {
    if(loaded){
      const t = setTimeout(() => ScrollTrigger.refresh(), 100);
      return () => clearTimeout(t);
    }
  }, [loaded]);

  return (
    <>
      <AnimatePresence>
        {!loaded && <Loader onDone={()=>setLoaded(true)} />}
      </AnimatePresence>
      <Nav />
      <main>
        <Hero />
        <Marquee />
        <Profile />
        <Stack />
        <Journey />
        <Projects />
        <Certifications />
        <Contact />
      </main>
    </>
  );
}

  }
}

<script>
window.onerror = function(message, source, lineno, colno, error) {
  const errDiv = document.createElement('div');
  errDiv.style.position = 'fixed';
  errDiv.style.top = '0';
  errDiv.style.left = '0';
  errDiv.style.right = '0';
  errDiv.style.background = 'rgba(255,0,0,0.8)';
  errDiv.style.color = 'white';
  errDiv.style.padding = '10px';
  errDiv.textContent = `Error: ${message} at ${source}:${lineno}:${colno}`;
  document.body.appendChild(errDiv);
  console.error(message, source, lineno, colno, error);
};
</script>
